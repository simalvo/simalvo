<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Who?</title>
  <meta name="description" content="Who the f*ck is Simon? It's Simalvo." />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #8e9bab;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    /* ── PAGE 1 ── */
    #page1 {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      position: absolute;
      inset: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #page1 a {
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
    }

    #question {
      font-family: 'Rajdhani', sans-serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(2.4rem, 7vw, 6rem);
      text-transform: uppercase;
      color: #1a1a1a;
      letter-spacing: 0.04em;
      line-height: 1.1;
      text-align: center;
      position: relative;
      transition: color 0.25s ease, letter-spacing 0.25s ease;
    }

    #question::after {
      content: '';
      display: block;
      height: 3px;
      width: 0%;
      background: #1a1a1a;
      margin: 0.3em auto 0;
      transition: width 0.35s ease;
    }

    #page1 a:hover #question {
      color: #000;
      letter-spacing: 0.08em;
    }

    #page1 a:hover #question::after {
      width: 100%;
    }

    /* ── PAGE 2 ── */
    #page2 {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #answer {
      font-family: 'Share Tech Mono', monospace;
      font-style: normal;
      font-weight: 300;
      font-size: clamp(1rem, 3vw, 2.2rem);
      color: #2a2a2a;
      letter-spacing: 0.02em;
      text-align: center;
    }

    #back {
      margin-top: 2.5em;
      font-family: 'Share Tech Mono', monospace;
      font-style: normal;
      font-size: clamp(0.6rem, 1.2vw, 0.85rem);
      color: #555;
      cursor: pointer;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      background: none;
      text-decoration: underline;
      text-underline-offset: 4px;
      transition: color 0.2s;
    }
    #back:hover { color: #111; }

    /* ── ACTIVE STATE ── */
    body.revealed #page1 {
      opacity: 0;
      transform: translateY(-30px);
      pointer-events: none;
    }
    body.revealed #page2 {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    /* ── KONAMI HINT ── */
    #konami-hint {
      position: fixed;
      bottom: 1.4rem;
      right: 1.4rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: #1a1a1a88;
      background: #8e9bab;
      border: 1px solid #1a1a1a1a;
      border-radius: 4px;
      padding: 0.5em 0.8em 0.55em;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      line-height: 1.6;
    }
    #konami-hint.visible {
      opacity: 1;
      transform: translateY(0);
    }
    #konami-hint .seq {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: #1a1a1acc;
      margin-top: 0.15em;
    }

    /* ── KONAMI EASTER EGG OVERLAY ── */
    #konami-overlay {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
      z-index: 100;
    }
    #konami-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    #konami-terminal {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      color: #39ff14;
      text-align: left;
      max-width: 560px;
      width: 90%;
      line-height: 2;
    }
    #konami-terminal .dim { color: #444; }
    #konami-terminal .cursor {
      display: inline-block;
      width: 0.55em;
      height: 1em;
      background: #39ff14;
      vertical-align: text-bottom;
      animation: blink 0.75s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #konami-dismiss {
      margin-top: 2.5em;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid #333;
      background: none;
      color: #555;
      padding: 0.5em 1.4em;
      cursor: pointer;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.4s ease, color 0.2s, border-color 0.2s;
    }
    #konami-dismiss.show { opacity: 1; }
    #konami-dismiss:hover { color: #39ff14; border-color: #39ff14; }
  </style>
</head>
<body>

  <!-- Page 1 -->
  <div id="page1">
    <a href="#" id="trigger">
      <div id="question">Who the f*ck is Simon?</div>
    </a>
  </div>

  <!-- Page 2 -->
  <div id="page2">
    <div id="answer">It's Simalvo.</div>
    <button id="back">← go back</button>
  </div>

  <!-- Idle hint -->
  <div id="konami-hint">
    <span class="seq">↑ ↑ ↓ ↓ ← → ← → B A</span>
  </div>

  <!-- Konami easter egg overlay -->
  <div id="konami-overlay">
    <div id="konami-terminal"></div>
    <button id="konami-dismiss">[ close ]</button>
  </div>

  <script>
    const trigger = document.getElementById('trigger');
    const back    = document.getElementById('back');

    trigger.addEventListener('click', e => {
      e.preventDefault();
      document.body.classList.add('revealed');
    });

    back.addEventListener('click', () => {
      document.body.classList.remove('revealed');
    });

    /* ── IDLE HINT ── */
    const hint = document.getElementById('konami-hint');
    let idleTimer;

    function resetIdle() {
      hint.classList.remove('visible');
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => hint.classList.add('visible'), 6000);
    }

    ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(ev =>
      window.addEventListener(ev, resetIdle, { passive: true })
    );
    resetIdle();

    /* ── KONAMI CODE ── */
    const KONAMI = [
      'ArrowUp','ArrowUp','ArrowDown','ArrowDown',
      'ArrowLeft','ArrowRight','ArrowLeft','ArrowRight',
      'b','a'
    ];
    let konamiPos = 0;

    document.addEventListener('keydown', e => {
      const expected = KONAMI[konamiPos];
      const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      if (key === expected) {
        konamiPos++;
        if (konamiPos === KONAMI.length) {
          konamiPos = 0;
          triggerKonami();
        }
      } else {
        konamiPos = (key === KONAMI[0]) ? 1 : 0;
      }
    });

    /* ── EASTER EGG ── */
    const overlay  = document.getElementById('konami-overlay');
    const terminal = document.getElementById('konami-terminal');
    const dismiss  = document.getElementById('konami-dismiss');

    const lines = [
      { text: '> oh, so you found the cheat code.',   delay: 0    },
      { text: '> fine. here\'s the truth:',            delay: 700  },
      { text: '',                                      delay: 1300 },
      { text: '  Simon is Simalvo.',                   delay: 1500 },
      { text: '  Simalvo is Simon.',                   delay: 2000 },
      { text: '  Beyond that — classified.',           delay: 2500 },
      { text: '',                                      delay: 3000 },
      { text: '  Clearance required :  ██████',        delay: 3200 },
      { text: '  Your clearance     :  none',          delay: 3700 },
      { text: '',                                      delay: 4100 },
      { text: '> close this tab and forget everything.', delay: 4300 },
    ];

    function triggerKonami() {
      hint.classList.remove('visible');
      clearTimeout(idleTimer);

      terminal.innerHTML = '';
      dismiss.classList.remove('show');
      overlay.classList.add('active');

      lines.forEach(({ text, delay }) => {
        setTimeout(() => {
          const row = document.createElement('div');
          row.textContent = text;
          if (text.startsWith('  ')) row.style.color = '#cfffb0';
          terminal.appendChild(row);
        }, delay);
      });

      setTimeout(() => {
        const cursorRow = document.createElement('div');
        cursorRow.innerHTML = '<span class="cursor"></span>';
        terminal.appendChild(cursorRow);
        dismiss.classList.add('show');
      }, 5000);
    }

    dismiss.addEventListener('click', () => {
      overlay.classList.remove('active');
      resetIdle();
    });
  </script>
</body>
</html>
